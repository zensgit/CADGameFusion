name: Editor Solve CI

# Gates the editor native solve loop (run+show, router /solve-cadgf transport, writeback,
# conflict-UX). This workflow is ALWAYS-RUN (no top-level paths: filter) so its jobs report a
# conclusion on EVERY pull request — a required status check must always be able to report, which a
# path-filtered workflow cannot (non-matching PRs would wait forever on a check that never runs).
#
# Each job self-detects whether solve-loop files changed (no cross-job `needs`, so a job can never be
# skipped-and-never-report): on a solve-loop change it runs the real validation; otherwise it exits
# success trivially. Fail-safe: if change detection can't run, it defaults to running the real work.
#
# Jobs (safe to add to branch protection required checks once each has reported on both a solve and a
# non-solve PR):
#   - solve unit tests (web_viewer, node)
#   - /solve-cadgf smoke (real solve_from_project)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  solve-unit:
    name: solve unit tests (web_viewer, node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect solve-loop changes
        id: detect
        run: bash .github/scripts/detect_solve_changes.sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.solve == 'true'
        with:
          node-version: '20'
      - name: Run solve unit tests (or trivial pass)
        run: |
          if [ "${{ steps.detect.outputs.solve }}" = "true" ]; then
            node --test tools/web_viewer/tests/solve_*.test.js
          else
            echo "No solve-loop changes; solve unit tests not needed — gate reports pass."
          fi

  solve-cadgf-smoke:
    name: /solve-cadgf smoke (real solve_from_project)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect solve-loop changes
        id: detect
        run: bash .github/scripts/detect_solve_changes.sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
      - uses: actions/setup-python@v5
        if: steps.detect.outputs.solve == 'true'
        with:
          python-version: '3.x'
      - name: Build solve_from_project + run /solve-cadgf smoke (or trivial pass)
        run: |
          if [ "${{ steps.detect.outputs.solve }}" != "true" ]; then
            echo "No solve-loop changes; /solve-cadgf smoke not needed — gate reports pass."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libeigen3-dev
          cmake -S . -B build_solve -G Ninja \
            -DBUILD_EDITOR_QT=OFF -DCADGF_USE_NLOHMANN_JSON=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build_solve --target solve_from_project --parallel 2
          python3 tools/plm_solve_cadgf_smoke.py \
            --solve-cli "$PWD/build_solve/tools/solve_from_project" --port 9099
